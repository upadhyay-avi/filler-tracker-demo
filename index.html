<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Release Order Generator - Artgraphics</title>
    <link rel="icon" type="image/x-icon" href="Logo.ico">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 20px;
            color: #1f2937;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05), 0 4px 6px rgba(0, 0, 0, 0.02);
            padding: 40px;
            max-width: 750px;
            width: 100%;
        }

        /* Header & Status */
        /* Header & Status */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 25px;
            border-bottom: 1px dashed #cbd5e1;
            /* Subtle divider to separate header from content */
        }

        .header h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            letter-spacing: -0.5px;
            margin-bottom: 2px;
        }

        /* Give the 'Art' in Artgraphics the primary brand color */
        .header h1 span {
            color: #ea580c;
        }

        .header .tagline {
            color: #64748b;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 16px;
        }

        .header .app-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            color: #475569;
            padding: 6px 16px;
            border-radius: 9999px;
            /* Creates a pill shape */
            font-size: 13px;
            font-weight: 600;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 16px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .ro-number-display {
            display: flex;
            flex-direction: column;
        }

        .ro-number-display .label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            color: #64748b;
            letter-spacing: 0.5px;
        }

        .ro-number-display .number {
            font-size: 20px;
            font-weight: 700;
            color: #4f46e5;
        }

        /* Mode Switcher */
        .mode-controls {
            text-align: right;
        }

        .mode-controls h3 {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 4px;
            font-weight: 500;
        }

        #toggleModeBtn {
            background: #e0e7ff;
            color: #4f46e5;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        #toggleModeBtn:hover {
            background: #c7d2fe;
        }

        /* Form Layout */
        .form-section {
            border-top: 1px solid #f1f5f9;
            padding-top: 20px;
            margin-top: 20px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        /* Header for inputs with Retain Toggle */
        .label-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }

        .label-header label {
            font-size: 13px;
            font-weight: 600;
            color: #334155;
        }

        /* Custom Retain Toggle Switch */
        .retain-wrapper {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }

        .retain-wrapper span {
            font-size: 11px;
            font-weight: 500;
            color: #64748b;
        }

        .retain-toggle {
            position: relative;
            width: 28px;
            height: 16px;
            appearance: none;
            background: #cbd5e1;
            border-radius: 16px;
            outline: none;
            cursor: pointer;
            transition: background 0.3s;
        }

        .retain-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.2);
        }

        .retain-toggle:checked {
            background: #4f46e5;
        }

        .retain-toggle:checked::after {
            transform: translateX(12px);
        }

        /* Inputs */
        input[type="text"],
        input[type="number"],
        input[type="date"],
        select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            color: #0f172a;
            background: #f8fafc;
            transition: all 0.2s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #4f46e5;
            background: white;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .size-input-group {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 12px;
            align-items: center;
        }

        .size-input-group span {
            font-weight: 600;
            color: #94a3b8;
            font-size: 14px;
        }

        .helper-text {
            font-size: 11px;
            color: #64748b;
            margin-top: 6px;
        }

        /* Primary Button */
        .btn-generate {
            width: 100%;
            background: #4f46e5;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
            box-shadow: 0 4px 6px rgba(79, 70, 229, 0.2);
        }

        .btn-generate:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 10px rgba(79, 70, 229, 0.3);
        }

        .btn-generate:active {
            transform: translateY(0);
        }

        .btn-generate:disabled {
            background: #94a3b8 !important;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Correction Search Box */
        #correctionSearch {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        #correctionSearch label {
            color: #991b1b;
        }

        #correctionSearch button {
            background: #b91c1c;
            color: white;
            border: none;
            padding: 0 16px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        #correctionSearch button:hover {
            background: #991b1b;
        }

        /* Status Messages */
        .status-message {
            margin-top: 15px;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }

        .status-message.success {
            background: #ecfdf5;
            color: #065f46;
            border: 1px solid #a7f3d0;
        }

        .status-message.error {
            background: #fef2f2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }

        .status-message.info {
            background: #eff6ff;
            color: #1e40af;
            border: 1px solid #bfdbfe;
        }

        /* Loading Spinner */
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, .3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* ==================== MOBILE RESPONSIVENESS ==================== */
        @media (max-width: 600px) {
            body {
                padding: 15px 10px;
            }

            .container {
                padding: 25px 20px;
            }

            .header h1 {
                font-size: 26px;
            }

            /* Stack the 2-column grid into a single column */
            .form-row {
                grid-template-columns: 1fr;
                gap: 16px;
            }

            /* Stack the Top Bar */
            .top-bar {
                flex-direction: column;
                align-items: stretch;
                text-align: center;
                gap: 15px;
            }

            .ro-number-display {
                border-bottom: 1px solid #e2e8f0;
                padding-bottom: 12px;
            }

            .mode-controls {
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1><span>Art</span>graphics</h1>
            <div class="tagline">Advertising Consultants</div>
            <div class="app-badge">
                📄 Release Order Generator
            </div>
        </div>

        <div class="top-bar">
            <div class="ro-number-display" id="roNumberDisplay">
                <span class="label">Next R.O. Number</span>
                <span class="number" id="nextRONumber">Loading...</span>
            </div>
            <div class="mode-controls">
                <h3>Mode: <span id="modeLabel" style="color: #4f46e5; font-weight: 700;">Create New</span></h3>
                <button type="button" id="toggleModeBtn" onclick="toggleEditMode()">
                    Switch to Correction Mode
                </button>
            </div>
        </div>

        <div id="correctionSearch" style="display: none;">
            <div class="form-group" style="margin: 0;">
                <div class="label-header">
                    <label>Enter RO Number to Correct</label>
                </div>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="searchRoNumber" placeholder="e.g. 25-26/0002">
                    <button type="button" onclick="fetchROData()">Load</button>
                </div>
            </div>
        </div>

        <form id="releaseOrderForm">

            <div class="form-row">
                <div class="form-group">
                    <div class="label-header">
                        <label for="templateType">RO Type *</label>
                        <label class="retain-wrapper">
                            <span>Retain</span>
                            <input type="checkbox" class="retain-toggle" id="retain_templateType" checked>
                        </label>
                    </div>
                    <select id="templateType" required>
                        <option value="RO_With_Remarks.pdf">Small(Remarks)</option>
                        <option value="RO_No_Remarks.pdf">Big(No Remarks)</option>
                    </select>
                </div>

                <div class="form-group">
                    <div class="label-header">
                        <label>Color Format</label>
                        <label class="retain-wrapper">
                            <span>Retain</span>
                            <input type="checkbox" class="retain-toggle" id="retain_isBW" checked>
                        </label>
                    </div>
                    <label
                        style="display: flex; align-items: center; gap: 10px; padding: 10px; background: #f8fafc; border: 1px solid #cbd5e1; border-radius: 8px; cursor: pointer; height: 100%;">
                        <input type="checkbox" id="isBW" style="width: 18px; height: 18px; accent-color: #4f46e5;">
                        <span style="font-size: 14px; font-weight: 500; color: #334155;">Print in Black & White
                            (B/W)</span>
                    </label>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <div class="label-header">
                            <label for="publicationName">Publication Name *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_publicationName">
                            </label>
                        </div>
                        <input type="text" id="publicationName" required placeholder="e.g., The Times of India">
                    </div>

                    <div class="form-group">
                        <div class="label-header">
                            <label for="edition">Edition/Place *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_edition">
                            </label>
                        </div>
                        <input type="text" id="edition" required placeholder="e.g., Lucknow Edition">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <div class="label-header">
                            <label for="client">Client Name *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_client" checked>
                            </label>
                        </div>
                        <input type="text" id="client" required placeholder="e.g., ABC Company Pvt. Ltd.">
                    </div>

                    <div class="form-group">
                        <div class="label-header">
                            <label for="position">Position *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_position" checked>
                            </label>
                        </div>
                        <input type="text" id="position" required value="BEST" placeholder="e.g., BEST, Front Page">
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <div class="label-header">
                            <label for="generationDate">Generation Date *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_generationDate" checked>
                            </label>
                        </div>
                        <input type="date" id="generationDate" required>
                    </div>

                    <div class="form-group">
                        <div class="label-header">
                            <label for="scheduledDate">Scheduled Date *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_scheduledDate" checked>
                            </label>
                        </div>
                        <input type="date" id="scheduledDate" required>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-row">
                    <div class="form-group">
                        <div class="label-header">
                            <label>Size (in CM) *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_size" checked>
                            </label>
                        </div>
                        <div class="size-input-group">
                            <input type="number" id="sizeWidth" required placeholder="Width" min="1" step="0.1">
                            <span>X</span>
                            <input type="number" id="sizeHeight" required placeholder="Height" min="1" step="0.1">
                        </div>
                        <div class="helper-text">Example: 26 X 33 (Width X Height)</div>
                    </div>

                    <div class="form-group">
                        <div class="label-header">
                            <label for="rate">Rate *</label>
                            <label class="retain-wrapper">
                                <span>Retain</span>
                                <input type="checkbox" class="retain-toggle" id="retain_rate" checked>
                            </label>
                        </div>
                        <input type="text" id="rate" required placeholder="e.g., 2000 - less 20%">
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-generate" id="generateBtn">
                Generate Release Order
            </button>
        </form>

        <div class="status-message" id="statusMessage"></div>
    </div>

    <script>
        // ==================== CONFIGURATION ====================
        // IMPORTANT: Replace this with your Google Apps Script Web App URL
        const GOOGLE_APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxW8sBm-jx843ksdUwy4Vz7jvSrvIaCPRCHl1JrdBKpIlotAJMi5OYn8eCV4U7R5GocgA/exec';

        // ==================== GLOBAL VARIABLES ====================
        let pdfTemplate = null;
        let isEditMode = false;
        // let nextRONumber = null;

        // ==================== INITIALIZATION ====================
        document.addEventListener('DOMContentLoaded', async () => {
            // await loadPDFTemplate();
            document.getElementById('generationDate').value = getTodayYYYYMMDD(); // Set default date
            await fetchNextRONumber();
            setupFormSubmission();
        });

        // ==================== PDF TEMPLATE LOADING ====================
        async function loadPDFTemplate() {
            try {
                const response = await fetch('RO.pdf');
                const arrayBuffer = await response.arrayBuffer();
                pdfTemplate = arrayBuffer;
                console.log('PDF template loaded successfully');
            } catch (error) {
                showStatus('error', 'Failed to load PDF template. Please refresh the page.');
                console.error('Error loading PDF:', error);
            }
        }

        // ==================== FETCH NEXT R.O. NUMBER ====================
        async function fetchNextRONumber() {
            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL + '?action=getNextRONumber');
                const data = await response.json();

                if (data.success) {
                    nextRONumber = data.nextRONumber;
                    document.getElementById('nextRONumber').textContent = nextRONumber;
                } else {
                    throw new Error(data.message || 'Failed to fetch R.O. number');
                }
            } catch (error) {
                document.getElementById('nextRONumber').textContent = 'Error loading';
                showStatus('error', 'Could not connect to Google Sheets. Check your Apps Script URL.');
                console.error('Error fetching R.O. number:', error);
            }
        }

        // ==================== FORM SUBMISSION ====================
        function setupFormSubmission() {
            const form = document.getElementById('releaseOrderForm');
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                await generateReleaseOrder();
            });
        }

        // ==================== HELPER FUNCTIONS ====================
        function toggleEditMode() {
            isEditMode = !isEditMode;
            const modeLabel = document.getElementById('modeLabel');
            const toggleBtn = document.getElementById('toggleModeBtn');
            const searchBox = document.getElementById('correctionSearch');
            const generateBtn = document.getElementById('generateBtn');
            const roDisplay = document.getElementById('roNumberDisplay');

            if (isEditMode) {
                modeLabel.textContent = "Correction / Edit";
                modeLabel.style.color = "#e53e3e"; // Red
                toggleBtn.textContent = "Switch to Create New";
                searchBox.style.display = "block";
                generateBtn.textContent = "Update & Re-Generate PDF";
                generateBtn.style.background = "linear-gradient(135deg, #e53e3e 0%, #c53030 100%)"; // Red button
                roDisplay.style.opacity = "0.5"; // Dim the next number display
            } else {
                modeLabel.textContent = "Create New";
                modeLabel.style.color = "#667eea";
                toggleBtn.textContent = "Switch to Correction Mode";
                searchBox.style.display = "none";
                generateBtn.textContent = "Generate Release Order";
                generateBtn.style.background = ""; // Reset gradient
                roDisplay.style.opacity = "1";
                document.getElementById('releaseOrderForm').reset();
                document.getElementById('generationDate').value = getTodayYYYYMMDD(); // <-- Re-apply today's date
                fetchNextRONumber(); // Refresh next number
            }
        }

        async function fetchROData() {
            const roInput = document.getElementById('searchRoNumber').value.trim();
            if (!roInput) return alert("Please enter an RO Number");

            const btn = event.target;
            btn.textContent = "Loading...";

            try {
                const response = await fetch(`${GOOGLE_APPS_SCRIPT_URL}?action=fetchRO&roNumber=${encodeURIComponent(roInput)}`);
                const result = await response.json();

                if (result.success) {
                    populateForm(result.data);
                    showStatus('info', 'Data loaded. Make your corrections.');
                    // Override the global nextRONumber so the PDF generator uses the OLD number
                    nextRONumber = result.data.roNumber;
                    document.getElementById('nextRONumber').textContent = nextRONumber + " (Editing)";
                } else {
                    alert("RO Number not found!");
                }
            } catch (e) {
                console.error(e);
                alert("Error fetching data");
            } finally {
                btn.textContent = "Load";
            }
        }

        function populateForm(data) {
            document.getElementById('publicationName').value = data.publicationName;
            document.getElementById('edition').value = data.edition;
            document.getElementById('client').value = data.client;

            // Populate Position
            if (data.position) {
                document.getElementById('position').value = data.position;
            }

            // Parse Date for Input (Spreadsheet date format might differ)
            // Handle Scheduled Date
            if (data.scheduledDate) {
                // Response format: "03/01/2026  \"MUST\""
                let rawDateStr = data.scheduledDate.toString();

                // 1. Remove "MUST", quotes, and extra whitespace
                // Result: "03/01/2026"
                let cleanDateStr = rawDateStr.replace(/["']?MUST["']?/i, '').trim();

                // 2. Split by "/"
                const parts = cleanDateStr.split('/'); // ["03", "01", "2026"]

                if (parts.length === 3) {
                    // 3. Reformat to YYYY-MM-DD for the HTML input
                    // parts[2] is Year (2026)
                    // parts[1] is Month (01)
                    // parts[0] is Day (03)
                    const formattedDate = `${parts[2]}-${parts[1]}-${parts[0]}`;

                    // Assign to input
                    document.getElementById('scheduledDate').value = formattedDate;
                } else {
                    console.warn("Could not parse date:", cleanDateStr);
                }
            }

            // Handle Generation Date (Parse from DD/MM/YYYY to YYYY-MM-DD)
            if (data.date) {
                let cleanGenDate = data.date.toString().trim();
                const genParts = cleanGenDate.split('/'); // ["DD", "MM", "YYYY"]

                if (genParts.length === 3) {
                    const formattedGenDate = `${genParts[2]}-${genParts[1].padStart(2, '0')}-${genParts[0].padStart(2, '0')}`;
                    document.getElementById('generationDate').value = formattedGenDate;
                } else {
                    console.warn("Could not parse generation date:", cleanGenDate);
                }
            }

            // Rate
            document.getElementById('rate').value = data.rate.split(' + GST')[0]; // Strip suffix to let user edit raw value

            // Attempt to parse Size back to width/height
            // Format: "26CM (W) X 33CM (H)..."
            try {
                const parts = data.size.match(/([\d.]+)CM \(W\) X ([\d.]+)CM \(H\)/);
                if (parts) {
                    document.getElementById('sizeWidth').value = parts[1];
                    document.getElementById('sizeHeight').value = parts[2];
                }
                document.getElementById('isBW').checked = data.size.includes("(B/W)");
            } catch (e) { console.log("Could not auto-parse size"); }

            // Handle Template Type
            if (data.templateType) {
                const templateSelect = document.getElementById('templateType');
                // Check if the value exists in the dropdown (to avoid errors)
                if ([...templateSelect.options].some(o => o.value === data.templateType)) {
                    templateSelect.value = data.templateType;
                }
            }
        }

        // Helper to format today's date as YYYY-MM-DD for the HTML input
        function getTodayYYYYMMDD() {
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            return `${yyyy}-${mm}-${dd}`;
        }

        // ==================== RESET FORM SMARTLY ====================
        function resetFormSmartly() {
            // List of all input IDs you want to manage
            const fieldIds = [
                'generationDate',
                'publicationName',
                'edition',
                'client',
                'scheduledDate',
                'size',
                'position',
                'rate',
                'isBW', // Checkbox for B/W
                'templateType'
            ];

            fieldIds.forEach(id => {
                // 1. Check if the "Retain" checkbox exists and is checked
                const retainCheckbox = document.getElementById('retain_' + id);
                const shouldRetain = retainCheckbox && retainCheckbox.checked;

                // 2. If NOT retaining, clear the field
                if (!shouldRetain) {
                    const field = document.getElementById(id);
                    if (field.type === 'checkbox') {
                        field.checked = false;
                    } else if (id === 'generationDate') {
                        field.value = getTodayYYYYMMDD(); // Reset to today, not blank
                    } else if (id === 'position') {
                        field.value = 'BEST'; // <-- Reset to 'BEST' instead of blank
                    } else {
                        field.value = '';
                    }
                }
            });
        }

        // ==================== GENERATE RELEASE ORDER ====================
        async function generateReleaseOrder() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> Generating...';

            try {
                // Collect form data
                const formData = collectFormData();

                // Generate PDF (Wait for it to build in memory)
                const pdfBytes = await fillPDFTemplate(formData);

                // 1. SAVE TO GOOGLE SHEETS FIRST
                // We must do this before the PDF download, otherwise iOS Safari 
                // suspends the script when the download prompt appears!
                await saveToGoogleSheets(formData);

                // 2. DOWNLOAD PDF SECOND
                await downloadPDF(pdfBytes, `${formData.publicationName}-${nextRONumber.split('/')[1]}.pdf`);

                // Show success message
                showStatus('success', `Release Order ${nextRONumber} generated successfully!`);

                // Reset form and fetch new R.O. number
                resetFormSmartly();
                await fetchNextRONumber();

            } catch (error) {
                showStatus('error', 'Failed to generate release order: ' + error.message);
                console.error('Error generating R.O.:', error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Generate Release Order';
            }
        }

        // ==================== COLLECT FORM DATA ====================
        function collectFormData() {
            const width = parseFloat(document.getElementById('sizeWidth').value);
            const height = parseFloat(document.getElementById('sizeHeight').value);
            const sqcm = (width * height).toFixed(2);

            // Check B/W Checkbox
            const isBW = document.getElementById('isBW').checked;
            const bwSuffix = isBW ? ' (B/W)' : ''; // Append string if checked

            const scheduledDate = new Date(document.getElementById('scheduledDate').value);
            const formattedScheduledDate = scheduledDate.toLocaleDateString('en-IN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            const genDateVal = document.getElementById('generationDate').value;
            const genDateObj = new Date(genDateVal);
            const formattedGenDate = genDateObj.toLocaleDateString('en-IN', {
                day: '2-digit',
                month: '2-digit',
                year: 'numeric'
            });

            return {
                roNumber: nextRONumber,
                date: formattedGenDate, // Now pulls from the UI instead of new Date()
                publicationName: document.getElementById('publicationName').value,
                edition: document.getElementById('edition').value,
                client: document.getElementById('client').value,
                scheduledDate: formattedScheduledDate + '  \"MUST\"',
                scheduledDateSS: formattedScheduledDate,
                size: `${width}CM (W) X ${height}CM (H) = ${sqcm} SQCM ${bwSuffix}`,
                sizeSS: `${sqcm}`,
                // Add template filename to data so we know which one to load
                templateFilename: document.getElementById('templateType').value,
                templateType: document.getElementById('templateType').value,
                position: document.getElementById('position').value,
                // UPDATED: Hardcoded material value
                material: 'Ad. enclosed/Download/By Mail',
                rate: document.getElementById('rate').value + ' + GST as applicable',
            };
        }

        // Helper function to draw centered text
        function drawCenteredText(page, text, font, fontSize, y, xStart, xEnd, color) {
            const textWidth = font.widthOfTextAtSize(text, fontSize);
            const boxWidth = xEnd - xStart;
            // Calculate centered X position
            const centeredX = xStart + (boxWidth - textWidth) / 2;
            page.drawText(text, {
                x: centeredX,
                y: y,
                size: fontSize,
                font: font,
                color: color
            });
        }


        // ==================== FILL PDF TEMPLATE ====================
        async function fillPDFTemplate(data) {
            const { PDFDocument, rgb, StandardFonts } = PDFLib;

            // Load the PDF template
            // Fetch the SPECIFIC PDF based on user selection
            const response = await fetch(data.templateFilename);
            const pdfTemplate = await response.arrayBuffer();
            const pdfDoc = await PDFDocument.load(pdfTemplate);
            const helveticaFont = await pdfDoc.embedFont(StandardFonts.Helvetica);
            const boldFont = await pdfDoc.embedFont(StandardFonts.HelveticaBold);
            const pages = pdfDoc.getPages();
            const firstPage = pages[0];

            // Define text positions (these will need to be adjusted based on your PDF)
            const textConfig = {
                fontSize: 14,
                color: rgb(1, 0, 0)
            };
            const textConfigB = {
                fontSize: 11,
                color: rgb(0, 0, 0)
            };
            const textConfigC = {
                fontSize: 12,
                color: rgb(1, 0, 0)
            };

            // R.O. Number
            drawCenteredText(
                firstPage,
                data.roNumber,
                boldFont,        // Pass the font instance
                textConfigB.fontSize,
                644,                  // Y coordinate
                360,                   // Left boundary (xStart)
                500,                  // Right boundary (xEnd)
                textConfigB.color
            );

            // Date
            drawCenteredText(
                firstPage,
                data.date,
                boldFont,        // Pass the font instance
                textConfigB.fontSize,
                619,                  // Y coordinate
                350,                   // Left boundary (xStart)
                500,                  // Right boundary (xEnd)
                textConfigB.color
            );

            // Publication Name (Line 1)
            drawCenteredText(
                firstPage,
                data.publicationName,
                boldFont,        // Pass the font instance
                textConfig.fontSize,
                589,                  // Y coordinate
                65,                   // Left boundary (xStart)
                425,                  // Right boundary (xEnd)
                textConfig.color
            );

            // Edition (Line 2)
            drawCenteredText(
                firstPage,
                data.edition,
                boldFont,        // Pass the font instance
                textConfig.fontSize,
                564,                  // Y coordinate
                65,                   // Left boundary (xStart)
                425,                  // Right boundary (xEnd)
                textConfig.color
            );

            // Client
            firstPage.drawText(data.client, {
                x: 110,
                y: 490,
                size: textConfigC.fontSize,
                font: boldFont,
                color: textConfigC.color
            });

            // Scheduled Date
            firstPage.drawText(data.scheduledDate, {
                x: 155,
                y: 452,
                size: textConfigC.fontSize,
                font: boldFont,
                color: textConfigC.color
            });

            // Size
            // 1. Separate the main size text from the suffix
            // We remove " (B/W)" from the data.size string first if it exists
            let mainSizeText = data.size;
            let suffix = "";

            if (data.size.endsWith(" (B/W)")) {
                mainSizeText = data.size.replace(" (B/W)", "");
                suffix = "  (B/W)";
            }
            // 3. Draw Main Size Text in RED
            firstPage.drawText(mainSizeText, {
                x: 100,
                y: 413,
                size: textConfigC.fontSize,
                font: boldFont,
                color: textConfigC.color
            });
            // 4. If we have a suffix, draw it in BLACK right after the red text
            if (suffix) {
                // Measure width of the red text so we know where to start the black text
                const mainTextWidth = boldFont.widthOfTextAtSize(mainSizeText, textConfigC.fontSize);
                firstPage.drawText(suffix, {
                    x: 100 + mainTextWidth, // Start exactly where red text ends
                    y: 413,
                    size: textConfigC.fontSize,
                    font: boldFont,
                    color: textConfigB.color       // <--- BLACK COLOR
                });
            }

            // Position
            firstPage.drawText(data.position, {
                x: 120,
                y: 374,
                size: textConfigC.fontSize,
                font: boldFont,
                color: textConfigC.color
            });

            // Material
            firstPage.drawText(data.material, {
                x: 120,
                y: 334,
                size: textConfigC.fontSize,
                font: boldFont,
                color: textConfigC.color
            });

            // Rate
            firstPage.drawText(data.rate, {
                x: 100,
                y: 297,
                size: textConfigC.fontSize,
                font: boldFont,
                color: textConfigC.color
            });

            // Save and return PDF bytes
            const pdfBytes = await pdfDoc.save();
            return pdfBytes;
        }

        // ==================== DOWNLOAD PDF ====================
        async function downloadPDF(pdfBytes, filename) {
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });

            // Convert the Blob to a File object, which the Web Share API requires
            const file = new File([blob], filename, { type: 'application/pdf' });

            // 1. TRY MOBILE NATIVE SHARE (iOS Safari / Android)
            if (navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                    await navigator.share({
                        files: [file],
                        title: 'Release Order',
                    });
                    console.log('File handed off to native OS share sheet.');
                    return; // Exit function if successful
                } catch (error) {
                    console.log('Share failed or was cancelled by user:', error);
                    // If the user just swiped the share sheet away, stop here.
                    if (error.name === 'AbortError') return;
                }
            }

            // 2. FALLBACK FOR DESKTOP (Standard browser download)
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.href = url;
            link.download = filename;

            // Append to body (required for Firefox & some older browsers)
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            // Clean up memory after a slight delay
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        // ==================== SAVE TO GOOGLE SHEETS ====================
        async function saveToGoogleSheets(data) {
            const action = isEditMode ? 'updateReleaseOrder' : 'saveReleaseOrder'; // <--- DYNAMIC ACTION

            try {
                const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: action,
                        data: data
                    })
                });

                console.log('Data sent to Google Sheets (' + action + ')');
            } catch (error) {
                console.error('Error saving to Google Sheets:', error);
                throw new Error('Could not save to tracking sheet');
            }
        }

        // ==================== STATUS MESSAGE ====================
        function showStatus(type, message) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = 'status-message ' + type;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';

            setTimeout(() => {
                statusDiv.style.display = 'none';
            }, 5000);
        }
    </script>
